apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-agent
  namespace: earningsiq
  labels:
    agent: research
    built-by: saif-mohammed
spec:
  replicas: 1
  selector:
    matchLabels:
      agent: research
  template:
    metadata:
      labels:
        agent: research
    spec:
      restartPolicy: Always
      containers:
        - name: research-agent
          image: earningsiq/research-agent:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "agents.research_agent:app", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          envFrom:
            - configMapRef:
                name: earningsiq-config
            - secretRef:
                name: earningsiq-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
